  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:       #3a7d44;
      --green-light: #4e9e5a;
      --green-dim:   #2d6235;
      --green-bg:    #edf7ef;
      --black:       #0d0d0d;
      --gray-900:    #111827;
      --gray-800:    #1f2937;
      --gray-600:    #4b5563;
      --gray-400:    #9ca3af;
      --gray-200:    #e5e7eb;
      --gray-100:    #f3f4f6;
      --white:       #ffffff;
      --shadow-sm:   0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
      --shadow-md:   0 4px 16px rgba(0,0,0,.10), 0 2px 6px rgba(0,0,0,.06);
      --shadow-lg:   0 10px 40px rgba(0,0,0,.12), 0 4px 12px rgba(0,0,0,.08);
      --radius:      12px;
    }

    /* ── Dark theme (set via data-theme="dark" on <html>) ── */
    html[data-theme="dark"] {
      --green-bg:  #16271a;
      --gray-900:  #f3f4f6;
      --gray-800:  #e5e7eb;
      --gray-600:  #b3b9c4;
      --gray-400:  #8a909c;
      --gray-200:  #2e2e34;
      --gray-100:  #131316;
      --white:     #1e1e22;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.4);
      --shadow-md: 0 4px 16px rgba(0,0,0,.5);
      --shadow-lg: 0 10px 40px rgba(0,0,0,.6);
    }

    /* ── Accessibility prefs ── */
    html[data-fontsize="large"]  { font-size: 112.5%; }
    html[data-fontsize="xlarge"] { font-size: 125%; }
    html[data-contrast="high"] {
      --gray-600: #000000;
      --gray-400: #333333;
    }
    html[data-theme="dark"][data-contrast="high"] {
      --gray-600: #ffffff;
      --gray-400: #cccccc;
    }
    html[data-motion="reduced"] *,
    html[data-motion="reduced"] *::before,
    html[data-motion="reduced"] *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
      scroll-behavior: auto !important;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--gray-100);
      color: var(--gray-900);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── NAV ── */
    nav {
      background: var(--black);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid #222;
    }

    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: var(--green);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    .logo-text {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.03em;
    }

    .logo-text span { color: var(--green-light); }

    .nav-badge {
      background: var(--green);
      color: var(--white);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 0.2rem 0.55rem;
      border-radius: 20px;
      text-transform: uppercase;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .nav-link {
      color: var(--gray-400);
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      transition: color 0.15s;
    }

    .nav-link:hover { color: var(--white); }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(160deg, var(--black) 0%, var(--gray-900) 55%, #0f2015 100%);
      padding: 4rem 1.5rem 5rem;
      text-align: center;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(58,125,68,.18);
      border: 1px solid rgba(58,125,68,.35);
      color: #7ec87e;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.3rem 0.9rem;
      border-radius: 20px;
      margin-bottom: 1.4rem;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.04em;
      line-height: 1.1;
      max-width: 700px;
      margin: 0 auto 1rem;
    }

    .hero h1 span { color: var(--green-light); }

    .hero-sub {
      color: var(--gray-400);
      font-size: 1.05rem;
      max-width: 520px;
      margin: 0 auto 2.5rem;
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      flex-wrap: wrap;
    }

    .stat {
      text-align: center;
    }

    .stat-num {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--white);
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--gray-400);
      margin-top: 0.15rem;
    }

    /* ── MAIN LAYOUT ── */
    .page-wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    /* ── SECTION LABELS ── */
    .section-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 0.6rem;
    }

    /* ── CARD ── */
    .card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 1.8rem;
      margin-bottom: 1.5rem;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-title-icon {
      width: 28px;
      height: 28px;
      background: var(--green-bg);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
    }

    /* ── CLUB SELECTOR ── */
    .club-section label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--gray-600);
      margin-bottom: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .club-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
    }

    .club-btn {
      background: var(--white);
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      color: var(--gray-600);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.4rem 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .club-btn:hover {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-bg);
    }

    .club-btn.selected {
      background: var(--green);
      border-color: var(--green);
      color: var(--white);
    }

    .club-divider { width: 100%; height: 0; border: none; margin: 0.2rem 0; }

    /* ── UPLOAD GRID ── */
    .upload-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.2rem;
    }

    @media (max-width: 580px) { .upload-grid { grid-template-columns: 1fr; } }

    .upload-card {
      border: 2px dashed var(--gray-200);
      border-radius: var(--radius);
      padding: 2rem 1.2rem;
      text-align: center;
      position: relative;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: var(--gray-100);
    }

    .upload-card:hover, .upload-card.dragover {
      border-color: var(--green);
      background: var(--green-bg);
    }

    .upload-card.has-file {
      border-color: var(--green);
      border-style: solid;
      background: var(--green-bg);
    }

    .upload-card input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon { font-size: 2rem; margin-bottom: 0.6rem; }

    .upload-label {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 0.3rem;
    }

    .upload-badge {
      display: inline-block;
      background: var(--gray-200);
      color: var(--gray-600);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.15rem 0.5rem;
      border-radius: 20px;
      margin-bottom: 0.4rem;
    }

    .upload-hint {
      font-size: 0.75rem;
      color: var(--gray-400);
    }

    .file-name {
      margin-top: 0.6rem;
      font-size: 0.78rem;
      color: var(--green);
      font-weight: 600;
      word-break: break-all;
    }

    .video-preview {
      margin-top: 0.75rem;
      width: 100%;
      border-radius: 8px;
      max-height: 160px;
      object-fit: cover;
      display: none;
    }

    /* ── SWING WINDOW SELECTOR ── */
    .swing-handle {
      position: absolute;
      top: 0;
      width: 18px;
      height: 36px;
      background: var(--green);
      border: 2px solid white;
      border-radius: 4px;
      cursor: ew-resize;
      transform: translateX(-50%);
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      z-index: 10;
    }
    .swing-handle:hover { background: var(--green-light); }
    .handle-label {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--green);
      white-space: nowrap;
      letter-spacing: 0.05em;
    }
    .window-btn {
      padding: 0.45rem 1rem;
      border: 2px solid var(--gray-200);
      border-radius: 8px;
      background: white;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--gray-700);
      transition: all 0.15s;
    }
    .window-btn:hover { border-color: var(--green); color: var(--green); }
    .window-btn.green { background: var(--green); color: white; border-color: var(--green); }
    .window-btn.green:hover { background: var(--green-light); }

    /* ── ANALYZE BUTTON ── */
    .analyze-btn {
      display: block;
      width: 100%;
      padding: 1rem;
      font-size: 1rem;
      font-weight: 700;
      color: var(--white);
      background: var(--green);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.15s, transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }

    .analyze-btn:hover:not(:disabled) {
      background: var(--green-light);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(58,125,68,.35);
    }

    .analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── HOW IT WORKS ── */
    .steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    @media (max-width: 600px) { .steps { grid-template-columns: 1fr; } }

    .step {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 1.2rem;
      box-shadow: var(--shadow-sm);
    }

    .step-num {
      width: 28px;
      height: 28px;
      background: var(--green);
      color: var(--white);
      border-radius: 50%;
      font-size: 0.78rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.7rem;
    }

    .step-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 0.3rem;
    }

    .step-desc {
      font-size: 0.78rem;
      color: var(--gray-400);
      line-height: 1.5;
    }

    /* ── LOADING ── */
    .loading {
      display: none;
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      padding: 3.5rem 2rem;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .loading-agents {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .agent-pill {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--gray-100);
      border: 1px solid var(--gray-200);
      border-radius: 30px;
      padding: 0.4rem 1rem;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--gray-600);
    }

    .agent-pill.active {
      background: var(--green-bg);
      border-color: var(--green);
      color: var(--green-dim);
    }

    .agent-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gray-400);
    }

    .agent-pill.active .agent-dot {
      background: var(--green);
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--gray-200);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.2rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 0.4rem;
    }

    .loading-sub {
      font-size: 0.82rem;
      color: var(--gray-400);
    }

    /* ── RESULTS ── */
    #results { display: none; }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .results-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--gray-900);
      letter-spacing: -0.02em;
    }

    .results-meta {
      font-size: 0.78rem;
      color: var(--gray-400);
      font-weight: 500;
    }

    /* ── FRAME VIEWER ── */
    .frames-section {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .frames-section-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .frames-section-title .badge {
      background: var(--green-bg);
      color: var(--green-dim);
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.15rem 0.5rem;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .frames-tabs {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .frame-tab {
      background: var(--gray-100);
      border: 1.5px solid var(--gray-200);
      border-radius: 6px;
      color: var(--gray-600);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.3rem 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .frame-tab:hover { border-color: var(--green); color: var(--green); }
    .frame-tab.active { background: var(--green); border-color: var(--green); color: var(--white); }

    .frames-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.75rem;
    }

    .frame-card {
      background: var(--gray-100);
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      overflow: hidden;
    }

    .frame-card img { width: 100%; display: block; }

    .frame-card-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--green-dim);
      padding: 0.4rem 0.65rem;
      background: var(--green-bg);
      text-align: center;
      letter-spacing: 0.04em;
    }

    /* ── ANALYSIS CONTENT ── */
    .analysis-card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 2rem;
      margin-bottom: 1.5rem;
      line-height: 1.75;
      font-size: 0.93rem;
      color: var(--gray-800);
    }

    .analysis-card h2 {
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--gray-900);
      margin: 2rem 0 0.8rem;
      padding: 0.65rem 1rem;
      background: var(--gray-100);
      border-left: 4px solid var(--green);
      border-radius: 0 8px 8px 0;
      letter-spacing: -0.01em;
    }

    .analysis-card h2:first-child { margin-top: 0; }

    .analysis-card h3 {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--gray-900);
      margin: 1.3rem 0 0.4rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .analysis-card h3::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .analysis-card p { margin-bottom: 0.75rem; color: var(--gray-800); }

    .analysis-card ul {
      list-style: none;
      padding-left: 0;
      margin-bottom: 0.75rem;
    }

    .analysis-card ul li {
      padding: 0.55rem 0.9rem;
      margin-bottom: 0.4rem;
      background: var(--gray-100);
      border-radius: 7px;
      border-left: 3px solid var(--green);
      color: var(--gray-800);
      font-size: 0.88rem;
    }

    .analysis-card ol {
      padding-left: 1.4rem;
      margin-bottom: 0.75rem;
    }

    .analysis-card ol li { margin-bottom: 0.4rem; color: var(--gray-800); }

    .analysis-card strong { color: var(--gray-900); font-weight: 700; }

    /* ── SPECIALIST REPORTS ── */
    .specialist-section {
      margin-bottom: 1.5rem;
    }

    .specialist-section-title {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray-400);
      margin-bottom: 0.75rem;
    }

    details.specialist {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      margin-bottom: 0.6rem;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    details.specialist summary {
      cursor: pointer;
      padding: 1rem 1.4rem;
      font-weight: 700;
      font-size: 0.88rem;
      color: var(--gray-900);
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }

    details.specialist summary::after {
      content: '›';
      font-size: 1.2rem;
      color: var(--gray-400);
      transition: transform 0.2s;
    }

    details.specialist[open] summary::after { transform: rotate(90deg); }

    details.specialist summary::-webkit-details-marker { display: none; }

    details.specialist .specialist-body {
      border-top: 1px solid var(--gray-200);
      padding: 1.5rem;
      font-size: 0.88rem;
      color: var(--gray-800);
      line-height: 1.7;
    }

    /* ── API KEY SECTION ── */
    .access-card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 1.8rem;
      margin-bottom: 1.5rem;
    }

    .free-banner {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--green-bg);
      border: 1px solid #b6d9be;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      color: var(--green-dim);
      font-weight: 500;
    }

    .free-banner .badge-free {
      background: var(--green);
      color: var(--white);
      font-size: 0.65rem;
      font-weight: 800;
      padding: 0.2rem 0.55rem;
      border-radius: 20px;
      white-space: nowrap;
      letter-spacing: 0.05em;
    }

    .used-banner {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      color: #92400e;
      font-weight: 500;
    }

    .api-key-wrap { margin-top: 0.25rem; }

    .api-key-wrap label {
      display: block;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--gray-600);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .api-key-row {
      display: flex;
      gap: 0.5rem;
    }

    .api-key-input {
      flex: 1;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      padding: 0.55rem 0.85rem;
      font-size: 0.85rem;
